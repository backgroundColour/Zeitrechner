<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    :root {
      --bg-main: #ffffff;
      --bg-sidebar: #f5f5f6;
      --text-main: #1d1d1f;
      --text-muted: #86868b;
      --accent-red: #fa233b;
      --hover-bg: rgba(0, 0, 0, 0.05);
      --border-color: rgba(0, 0, 0, 0.08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      font-weight: 400; 
      color: var(--text-main);
      background: var(--bg-main);
      -webkit-font-smoothing: antialiased;
      display: flex;
      overflow: hidden;
    }

    .mac-buttons {
      display: flex;
      gap: 8px;
      padding: 16px;
      margin-bottom: 10px;
    }

    .mac-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .mac-btn.close { background: #ff5f56; }
    .mac-btn.min { background: #ffbd2e; }
    .mac-btn.max { background: #27c93f; }

    .sidebar {
      width: 260px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .nav-section {
      padding: 0 12px;
      margin-bottom: 20px;
    }

    .nav-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      margin: 0 0 8px 12px;
      text-transform: capitalize;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 2px;
    }

    .nav-item svg {
      width: 18px;
      height: 18px;
      color: var(--text-muted);
    }

    .nav-item:hover {
      background: var(--hover-bg);
    }

    .nav-item.active {
      color: var(--accent-red);
      background: rgba(250, 35, 59, 0.1);
    }

    .nav-item.active svg {
      color: var(--accent-red);
    }

    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 30px 40px;
    }

    .header-bar {
      display: flex;
      align-items: center;
      margin-bottom: 30px;
      gap: 20px;
    }

    .search-bar {
      background: var(--bg-sidebar);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 8px 12px 8px 32px;
      width: 300px;
      font-size: 0.9rem;
      color: var(--text-main);
      outline: none;
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin: 0 0 16px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .timer-card {
      background: var(--bg-main);
      margin-bottom: 40px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      font-weight: 700;
    }

    .time-text {
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--accent-red);
      margin: 0 0 20px;
    }

    .controls {
      display: flex;
      gap: 12px;
    }

    button {
      appearance: none;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 6px 14px;
      background: var(--bg-sidebar);
      color: var(--text-main);
      font-family: inherit;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
    }

    button:hover { background: var(--hover-bg); }
    button.primary { background: var(--accent-red); color: white; border: none; }
    button.primary:hover { background: #d91b30; }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 24px;
    }

    .news-card {
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .news-img-wrap {
      aspect-ratio: 1;
      background: var(--bg-sidebar);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border-color);
    }

    .news-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .news-title {
      font-size: 0.95rem;
      font-weight: 500;
      margin: 0;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .news-date {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin: 0;
    }

    [hidden] { display: none !important; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="mac-buttons">
      <div class="mac-btn close"></div>
      <div class="mac-btn min"></div>
      <div class="mac-btn max"></div>
    </div>

    <div class="nav-section">
      <div class="nav-item" id="nav-home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>Home</span>
      </div>
      <div class="nav-item" id="nav-school">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c3 3 9 3 12 0v-5"></path></svg>
        <span>Schule</span>
      </div>
      <div class="nav-item" id="nav-work">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
        <span>Arbeit</span>
      </div>
    </div>
  </aside>

  <main class="content-area">
    <div class="header-bar">
      <input type="text" class="search-bar" placeholder="Suchen">
    </div>

    <div class="timer-card">
      <h1 id="MainTitle">Laden...</h1>
      <p id="TimeDisplay" class="time-text"></p>
      
      <div class="controls">
        <button id="opener">Zeiten wählen</button>
        <button id="autoMode" class="primary" hidden>Auto Modus</button>
      </div>
      
      <div id="timeButtons" style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px;" hidden></div>
    </div>

    <h2 class="section-title">Top Nachrichten <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="3" fill="none"><polyline points="9 18 15 12 9 6"></polyline></svg></h2>
    <div class="news-grid" id="newsGrid">
      <p style="color: var(--text-muted)">Lade Tagesschau...</p>
    </div>
  </main>

  <script>
    "use strict";

    const SCHOOL_DAYS = [1, 2];
    const WORK_DAYS = [3, 4, 5];
    const START_TIME = { h: 7, m: 55 };
    const WORK_END_TIME = { h: 16, m: 0 };

    const periods = [
      { label: "1. Stunde", h: 8,  m: 40 },
      { label: "2. Stunde", h: 9,  m: 25 },
      { label: "3. Stunde", h: 10, m: 25 },
      { label: "4. Stunde", h: 11, m: 10 },
      { label: "5. Stunde", h: 12, m: 10 },
      { label: "6. Stunde", h: 12, m: 55 },
      { label: "7. Stunde", h: 13, m: 55 },
      { label: "8. Stunde", h: 14, m: 40 },
    ];

    const elTitle = document.getElementById("MainTitle");
    const elText = document.getElementById("TimeDisplay");
    const elOpener = document.getElementById("opener");
    const elAuto = document.getElementById("autoMode");
    const elButtons = document.getElementById("timeButtons");
    const newsGrid = document.getElementById("newsGrid");

    const navItems = {
      home: document.getElementById("nav-home"),
      school: document.getElementById("nav-school"),
      work: document.getElementById("nav-work")
    };

    let customMode = false;
    let customIndex = 0;

    function pad2(n) { return String(n).padStart(2, "0"); }

    function getDateAt(baseDate, h, m) {
      const d = new Date(baseDate);
      d.setHours(h, m, 0, 0);
      return d;
    }

    function updateNavSelection(day) {
      Object.values(navItems).forEach(el => el.classList.remove("active"));
      
      if (customMode) return; 

      if (SCHOOL_DAYS.includes(day)) {
        navItems.school.classList.add("active");
      } else if (WORK_DAYS.includes(day)) {
        navItems.work.classList.add("active");
      } else {
        navItems.home.classList.add("active");
      }
    }

    function getAutoState(now) {
      const day = now.getDay(); 
      
      if (SCHOOL_DAYS.includes(day)) {
        const startToday = getDateAt(now, START_TIME.h, START_TIME.m);
        if (now < startToday) return { target: startToday, title: "Guten Morgen", prefix: "Schulbeginn in" };

        for (let i = 0; i < periods.length; i++) {
          const pEnd = getDateAt(now, periods[i].h, periods[i].m);
          if (now < pEnd) return { target: pEnd, title: `Schule: ${i + 1}. Stunde läuft`, prefix: `Noch ... bis ${pad2(periods[i].h)}:${pad2(periods[i].m)}` };
        }
      }

      if (WORK_DAYS.includes(day)) {
        const workEndToday = getDateAt(now, WORK_END_TIME.h, WORK_END_TIME.m);
        if (now < workEndToday) return { target: workEndToday, title: "Arbeitszeit", prefix: `Feierabend in ... (um ${pad2(WORK_END_TIME.h)}:${pad2(WORK_END_TIME.m)})` };
      }

      let d = new Date(now);
      d.setDate(d.getDate() + 1); 
      
      while (true) {
        const nextDay = d.getDay();
        if (SCHOOL_DAYS.includes(nextDay)) {
          d.setHours(START_TIME.h, START_TIME.m, 0, 0);
          return { target: d, title: "Nächster Schulbeginn", prefix: "Start in" };
        }
        if (WORK_DAYS.includes(nextDay)) {
          d.setHours(WORK_END_TIME.h, WORK_END_TIME.m, 0, 0);
          return { target: d, title: "Nächster Arbeitstag", prefix: `Feierabend in ... (um ${pad2(WORK_END_TIME.h)}:${pad2(WORK_END_TIME.m)})` };
        }
        d.setDate(d.getDate() + 1);
      }
    }

    function render() {
      const now = new Date();
      updateNavSelection(now.getDay());

      let state = customMode ? {
        target: (() => { 
          let t = getDateAt(now, periods[customIndex].h, periods[customIndex].m); 
          if(now > t) t.setDate(t.getDate() + 1); 
          return t; 
        })(),
        title: `Manuell: ${customIndex + 1}. Stunde`,
        prefix: "Ende in"
      } : getAutoState(now);

      const diffMs = Math.max(0, state.target - now);
      const d = Math.floor(diffMs / (1000 * 60 * 60 * 24));
      const h = Math.floor((diffMs / (1000 * 60 * 60)) % 24);
      const m = Math.floor((diffMs / (1000 * 60)) % 60);
      const s = Math.floor((diffMs / 1000) % 60);

      let timeString = (d > 0 ? `${d} d ` : "") + (d > 0 || h > 0 ? `${h} h ` : "") + `${m} m ${s} s`;

      elTitle.textContent = state.title;
      elText.textContent = state.prefix.includes("...") ? state.prefix.replace("...", timeString) : `${state.prefix} ${timeString}`;
    }

    async function fetchNews() {
      try {
        const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent('https://www.tagesschau.de/xml/rss2'));
        const data = await response.json();
        
        if(data.status === 'ok') {
            newsGrid.innerHTML = data.items.slice(0, 10).map(item => {
              const date = new Date(item.pubDate.replace(' ', 'T')).toLocaleString("de-DE", { hour: '2-digit', minute:'2-digit' });
              const imgHtml = item.thumbnail ? `<img src="${item.thumbnail}" class="news-img">` : `<div class="news-img" style="display:grid;place-items:center;background:#eee">Ohne Bild</div>`;

              return `
                <a href="${item.link}" target="_blank" class="news-card">
                  <div class="news-img-wrap">${imgHtml}</div>
                  <div>
                    <p class="news-title">${item.title}</p>
                    <p class="news-date">${item.author || 'Tagesschau'} &middot; ${date} Uhr</p>
                  </div>
                </a>
              `;
            }).join("");
        }
      } catch (err) {
        newsGrid.innerHTML = "<p>Fehler beim Laden.</p>";
      }
    }

    function init() {
      elButtons.innerHTML = periods.map((p, i) => `<button type="button" data-index="${i}">${p.label}</button>`).join("");

      elOpener.addEventListener("click", () => {
        elButtons.hidden = !elButtons.hidden; 
        elOpener.textContent = elButtons.hidden ? "Zeiten wählen" : "Schließen";
      });

      elButtons.addEventListener("click", (e) => {
        if (e.target.tagName === "BUTTON") {
          customMode = true;
          customIndex = Number(e.target.dataset.index);
          elButtons.hidden = true;
          elOpener.textContent = "Zeiten wählen";
          elAuto.hidden = false;
          
          Object.values(navItems).forEach(el => el.classList.remove("active"));
          navItems.school.classList.add("active");
          
          render();
        }
      });

      elAuto.addEventListener("click", () => {
        customMode = false;
        elAuto.hidden = true;
        render();
      });

      setInterval(render, 1000);
      render();
      
      fetchNews();
      setInterval(fetchNews, 5 * 60 * 1000);
    }

    init();
  </script>
</body>
</html>
