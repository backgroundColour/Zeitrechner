<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    :root {
      --bg-main: #e8e8ed;
      --text-main: #1d1d1f;
      --text-muted: #86868b;
      --apple-blue: #0071e3;
      --hover-bg: rgba(0, 0, 0, 0.05);
      --border-color: rgba(0, 0, 0, 0.06);
      --radius: 12px;
    }

    :root.dark-mode {
      --bg-main: #000000;
      --text-main: #f5f5f7;
      --text-muted: #a1a1a6;
      --hover-bg: rgba(255, 255, 255, 0.1);
      --border-color: rgba(255, 255, 255, 0.15);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      font-weight: 400; 
      color: var(--text-main);
      background: var(--bg-main);
      background-image: radial-gradient(circle at 100% 0%, #fdfdfd 0%, #e4e4e4 100%);
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
      padding: 16px;
      transition: background 0.3s, color 0.3s;
    }

    :root.dark-mode body {
      background-image: radial-gradient(circle at 100% 0%, #1c1c1e 0%, #000000 100%);
    }

    .content-area {
      position: absolute;
      top: 16px;
      bottom: 16px;
      left: 16px;
      right: 16px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0), inset 0 0 0 1px rgba(0,0,0,0);
      display: flex;
      flex-direction: column;
      overflow: hidden; 
      z-index: 1;
      transition: background 0.3s;
    }

    :root.dark-mode .content-area {
      background: #1c1c1e;
    }

    .sidebar-container {
      position: absolute;
      top: 32px; 
      bottom: 32px;
      left: 32px; 
      width: 260px;
      background: rgba(235, 235, 237, 0.45);
      backdrop-filter: blur(15px) saturate(180%);
      -webkit-backdrop-filter: blur(15px) saturate(180%);
      border-radius: 20px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
      display: flex;
      flex-direction: column;
      padding: 20px 12px;
      z-index: 10;
      transition: background 0.3s, border 0.3s, box-shadow 0.3s;
    }

    :root.dark-mode .sidebar-container {
      background: rgba(40, 40, 40, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 4px;
      transition: background 0.15s, color 0.15s;
    }

    .nav-item svg {
      width: 20px;
      height: 20px;
      color: var(--text-muted);
      transition: color 0.15s;
    }

    .nav-item:hover {
      background: var(--hover-bg);
    }

    .nav-item.active {
      color: white;
      background: var(--apple-blue);
    }

    .nav-item.active svg {
      color: white;
    }

    .timer-section {
      flex: 1; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 60px 40px 320px; 
      background: linear-gradient(to bottom, #ffffff 0%, #ffffff 100%);
      border-bottom: 1px solid var(--border-color);
      transition: background 0.3s, border-color 0.3s;
    }

    :root.dark-mode .timer-section {
      background: linear-gradient(to bottom, #1c1c1e 0%, #1c1c1e 100%);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .time-text {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 600;
      color: var(--apple-blue);
      margin: 0 0 35px;
      letter-spacing: -0.01em;
    }

    .controls {
      display: flex;
      gap: 12px;
    }

    button {
      appearance: none;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 10px 20px;
      background: #f5f5f7;
      color: var(--text-main);
      font-family: inherit;
      font-weight: 500;
      font-size: 1.05rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    :root.dark-mode button {
      background: #2c2c2e;
    }

    button:hover { background: #e8e8ed; }

    :root.dark-mode button:hover {
      background: #3a3a3c;
    }

    button.primary { background: var(--apple-blue); color: white; border: none; }
    button.primary:hover { background: #0077ED; }

    .news-section {
      padding: 30px 0 40px 0;
      background: #ffffff;
      transition: background 0.3s;
    }

    :root.dark-mode .news-section {
      background: #1c1c1e;
    }

    .news-slider {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding-bottom: 20px;
      scrollbar-width: none; 
      scroll-padding-left: 320px; 
    }

    .news-slider::-webkit-scrollbar {
      display: none; 
    }

    .news-slider::before {
      content: "";
      flex: 0 0 300px; 
    }

    .news-slider::after {
      content: "";
      flex: 0 0 40px;
    }

    .news-card {
      scroll-snap-align: start;
      flex: 0 0 280px; 
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .news-img-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #f5f5f7;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      transition: background 0.3s, border-color 0.3s;
    }

    :root.dark-mode .news-img-wrap {
      background: #2c2c2e;
    }

    .news-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .news-title {
      font-size: 1rem;
      font-weight: 500;
      margin: 0;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .news-date {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin: 0;
    }

    [hidden] { display: none !important; }
  </style>
</head>
<body>

  <aside class="sidebar-container">
    <div class="nav-item active" id="nav-school" data-type="school">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c3 3 9 3 12 0v-5"></path></svg>
      <span>Schule</span>
    </div>
    <div class="nav-item" id="nav-work" data-type="work">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
      <span>Arbeit</span>
    </div>
  </aside>

  <main class="content-area">
    <div class="timer-section">
      <h1 id="MainTitle">Laden...</h1>
      <p id="TimeDisplay" class="time-text"></p>
      
      <div class="controls">
        <button id="opener">Zeiten wählen</button>
        <button id="autoMode" class="primary" hidden>Auto Modus</button>
      </div>
      
      <div id="timeButtons" style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px;" hidden></div>
    </div>

    <div class="news-section">
      <div class="news-slider" id="newsGrid"></div>
    </div>
  </main>

  <script>
    "use strict";

    const SCHOOL_DAYS = [1, 2];
    const WORK_DAYS = [3, 4, 5];
    const START_TIME = { h: 7, m: 55 };
    const WORK_END_TIME = { h: 16, m: 0 };

    const periods = [
      { label: "1. Stunde", h: 8,  m: 40 },
      { label: "2. Stunde", h: 9,  m: 25 },
      { label: "3. Stunde", h: 10, m: 25 },
      { label: "4. Stunde", h: 11, m: 10 },
      { label: "5. Stunde", h: 12, m: 10 },
      { label: "6. Stunde", h: 12, m: 55 },
      { label: "7. Stunde", h: 13, m: 55 },
      { label: "8. Stunde", h: 14, m: 40 },
    ];

    const elTitle = document.getElementById("MainTitle");
    const elText = document.getElementById("TimeDisplay");
    const elOpener = document.getElementById("opener");
    const elAuto = document.getElementById("autoMode");
    const elButtons = document.getElementById("timeButtons");
    const newsGrid = document.getElementById("newsGrid");

    const navSchool = document.getElementById("nav-school");
    const navWork = document.getElementById("nav-work");

    let customMode = false;
    let manualNavOverride = false;
    let manualNavType = "school"; 
    let customIndex = 0;

    function pad2(n) { return String(n).padStart(2, "0"); }

    function getDateAt(baseDate, h, m) {
      const d = new Date(baseDate);
      d.setHours(h, m, 0, 0);
      return d;
    }

    function determineNavType(now) {
      if (manualNavOverride) return manualNavType;
      const day = now.getDay();
      if (WORK_DAYS.includes(day)) return "work";
      return "school";
    }

    function updateNavUI(type) {
      navSchool.classList.toggle("active", type === "school");
      navWork.classList.toggle("active", type === "work");
    }

    function getStateForSchool(now) {
      const startToday = getDateAt(now, START_TIME.h, START_TIME.m);
      if (now < startToday) return { target: startToday, title: "Guten Morgen", prefix: "Schulbeginn in" };

      for (let i = 0; i < periods.length; i++) {
        const pEnd = getDateAt(now, periods[i].h, periods[i].m);
        if (now < pEnd) return { target: pEnd, title: `Schule: ${i + 1}. Stunde läuft`, prefix: `Noch ... bis ${pad2(periods[i].h)}:${pad2(periods[i].m)}` };
      }

      let d = new Date(now);
      d.setDate(d.getDate() + 1);
      d.setHours(START_TIME.h, START_TIME.m, 0, 0);
      return { target: d, title: "Nächster Schulbeginn", prefix: "Start in" };
    }

    function getStateForWork(now) {
      const workEndToday = getDateAt(now, WORK_END_TIME.h, WORK_END_TIME.m);
      if (now < workEndToday) return { target: workEndToday, title: "Arbeitszeit", prefix: `Feierabend in ... (um ${pad2(WORK_END_TIME.h)}:${pad2(WORK_END_TIME.m)})` };

      let d = new Date(now);
      d.setDate(d.getDate() + 1);
      d.setHours(WORK_END_TIME.h, WORK_END_TIME.m, 0, 0);
      return { target: d, title: "Nächster Arbeitstag", prefix: `Feierabend in ... (um ${pad2(WORK_END_TIME.h)}:${pad2(WORK_END_TIME.m)})` };
    }

    function applyTheme(now) {
      const isOsDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const hour = now.getHours();
      const isTimeDark = hour >= 20 || hour < 6;
      
      if (isOsDark || isTimeDark) {
        document.documentElement.classList.add("dark-mode");
      } else {
        document.documentElement.classList.remove("dark-mode");
      }
    }

    function render() {
      const now = new Date();
      applyTheme(now);
      
      const currentNavType = determineNavType(now);
      updateNavUI(currentNavType);

      let state;

      if (customMode) {
        let t = getDateAt(now, periods[customIndex].h, periods[customIndex].m); 
        if(now > t) t.setDate(t.getDate() + 1); 
        state = { target: t, title: `Manuell: ${customIndex + 1}. Stunde`, prefix: "Ende in" };
      } else {
        if (currentNavType === "school") {
          state = getStateForSchool(now);
        } else {
          state = getStateForWork(now);
        }
      }

      const diffMs = Math.max(0, state.target - now);
      const d = Math.floor(diffMs / (1000 * 60 * 60 * 24));
      const h = Math.floor((diffMs / (1000 * 60 * 60)) % 24);
      const m = Math.floor((diffMs / (1000 * 60)) % 60);
      const s = Math.floor((diffMs / 1000) % 60);

      let timeString = (d > 0 ? `${d} d ` : "") + (d > 0 || h > 0 ? `${h} h ` : "") + `${m} m ${s} s`;

      elTitle.textContent = state.title;
      elText.textContent = state.prefix.includes("...") ? state.prefix.replace("...", timeString) : `${state.prefix} ${timeString}`;
    }

    async function fetchNews() {
      try {
        const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent('https://www.tagesschau.de/xml/rss2'));
        const data = await response.json();
        
        if(data.status === 'ok') {
            newsGrid.innerHTML = data.items.slice(0, 10).map(item => {
              const date = new Date(item.pubDate.replace(' ', 'T')).toLocaleString("de-DE", { hour: '2-digit', minute:'2-digit' });
              
              let imgUrl = item.thumbnail || "";
              
              if (!imgUrl && item.content) {
                const match = item.content.match(/src="([^"]+\.jpg[^"]*)"/i);
                if (match) imgUrl = match[1];
              }

              const imgHtml = imgUrl ? `<img src="${imgUrl}" class="news-img">` : `<div class="news-img" style="display:grid;place-items:center;background:#eee;color:#1d1d1f">Ohne Bild</div>`;

              return `
                <a href="${item.link}" target="_blank" class="news-card">
                  <div class="news-img-wrap">${imgHtml}</div>
                  <div>
                    <p class="news-title">${item.title}</p>
                    <p class="news-date">Heute, ${date} Uhr</p>
                  </div>
                </a>
              `;
            }).join("");
        }
      } catch (err) {
        newsGrid.innerHTML = "<p style='padding-left: 320px; color: var(--text-muted);'>Fehler beim Laden.</p>";
      }
    }

    function init() {
      elButtons.innerHTML = periods.map((p, i) => `<button type="button" data-index="${i}">${p.label}</button>`).join("");

      elOpener.addEventListener("click", () => {
        elButtons.hidden = !elButtons.hidden; 
        elOpener.textContent = elButtons.hidden ? "Zeiten wählen" : "Schließen";
      });

      elButtons.addEventListener("click", (e) => {
        if (e.target.tagName === "BUTTON") {
          customMode = true;
          manualNavOverride = false;
          customIndex = Number(e.target.dataset.index);
          elButtons.hidden = true;
          elOpener.textContent = "Zeiten wählen";
          elAuto.hidden = false;
          render();
        }
      });

      elAuto.addEventListener("click", () => {
        customMode = false;
        manualNavOverride = false;
        elAuto.hidden = true;
        render();
      });

      navSchool.addEventListener("click", () => {
        manualNavOverride = true;
        manualNavType = "school";
        customMode = false;
        elAuto.hidden = false;
        render();
      });

      navWork.addEventListener("click", () => {
        manualNavOverride = true;
        manualNavType = "work";
        customMode = false;
        elAuto.hidden = false;
        render();
      });

      setInterval(render, 1000);
      render();
      
      fetchNews();
      setInterval(fetchNews, 5 * 60 * 1000);
    }

    init();
  </script>
</body>
</html>
